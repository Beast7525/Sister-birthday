<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;600&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050510;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: white;
            opacity: 0;
            animation: fadeIn 1.5s ease-in-out forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            pointer-events: none;
            width: 100%;
        }

        .title {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            margin: 0;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 40px rgba(255, 105, 180, 0.8), 0 0 60px rgba(255, 105, 180, 0.6);
            animation: float 4s ease-in-out infinite, pulse 3s infinite alternate;
            background: -webkit-linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            padding: 0 20px;
        }

        .emojis {
            font-size: 3rem;
            margin-top: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            animation: float 4s ease-in-out infinite reverse;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulse {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.3); }
        }

        .btn-continue {
            pointer-events: auto;
            margin-top: 40px;
            display: inline-block;
            padding: 14px 30px;
            font-size: 1.2rem;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            text-decoration: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            opacity: 0;
            animation: fadeInBtn 1s ease-in-out 3s forwards;
        }

        .btn-continue:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        @keyframes fadeInBtn {
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            .title { font-size: 3.5rem; }
            .emojis { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <canvas id="fireworksCanvas"></canvas>

    <div class="content">
        <h1 class="title">Wishing you a year filled with laughter, unforgettable memories, and all the happiness your heart can hold. Happy Birthday!</h1>
        <div class="emojis">🎉 🎂 🎈 🎁</div>
        <a href="carousel.html" class="btn-continue">CLICK HE</a>
    </div>

    <script>
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); 
        let width, height;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // Stars
        const stars = [];
        for(let i=0; i<150; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                r: Math.random() * 1.5,
                alpha: Math.random(),
                speed: Math.random() * 0.02
            });
        }

        function drawStars() {
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, width, height); // Clear screen with sky color
            
            ctx.save();
            stars.forEach(star => {
                star.alpha += star.speed;
                if(star.alpha > 1 || star.alpha < 0) star.speed = -star.speed;
                
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.r, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(Math.sin(star.alpha))})`;
                ctx.fill();
            });
            ctx.restore();
        }

        // Fireworks
        const fireworks = [];
        const particles = [];

        class Firework {
            constructor() {
                this.x = Math.random() * width;
                this.y = height;
                this.targetY = height * 0.1 + Math.random() * (height * 0.4);
                this.speed = 8 + Math.random() * 6;
                this.angle = -Math.PI/2 + (Math.random() - 0.5) * 0.5;
                this.vx = Math.cos(this.angle) * this.speed;
                this.vy = Math.sin(this.angle) * this.speed;
                this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
                this.trail = [];
                this.exploded = false;
            }

            update() {
                this.trail.push({x: this.x, y: this.y});
                if(this.trail.length > 5) this.trail.shift();

                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.15; // Gravity

                if (this.vy >= 0 || this.y <= this.targetY) {
                    this.exploded = true;
                    this.explode();
                }
            }

            draw() {
                ctx.beginPath();
                if(this.trail.length > 0) {
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for(let i=1; i<this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                }
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;
                ctx.stroke();
            }

            explode() {
                const count = 80 + Math.random() * 60;
                for(let i=0; i<count; i++) {
                    particles.push(new Particle(this.x, this.y, this.color));
                }
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.trail = [];
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.color = color;
                this.alpha = 1;
                this.decay = 0.01 + Math.random() * 0.02;
                this.friction = 0.95;
                this.gravity = 0.2;
            }

            update() {
                this.trail.push({x: this.x, y: this.y});
                if(this.trail.length > 6) this.trail.shift();

                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.globalCompositeOperation = 'lighter';
                ctx.beginPath();
                if(this.trail.length > 0) {
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for(let i=1; i<this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                }
                ctx.strokeStyle = `rgba(${this.hexToRgb(this.color)}, ${this.alpha})`;
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.globalCompositeOperation = 'source-over';
            }

            hexToRgb(hsl) {
                // Since color is HSL string, we can just use the HSL in rgba by passing alpha differently,
                // but canvas strokeStyle accepts hsla directly! Let's modify:
                return this.color.replace(')', `, ${this.alpha})`).replace('hsl', 'hsla');
            }
        }

        function loop() {
            requestAnimationFrame(loop);
            
            // Draw background and stars
            drawStars();

            // Randomly launch fireworks
            if(Math.random() < 0.05 && fireworks.length < 5) {
                fireworks.push(new Firework());
            }

            for(let i = fireworks.length - 1; i >= 0; i--) {
                fireworks[i].update();
                fireworks[i].draw();
                if(fireworks[i].exploded) {
                    fireworks.splice(i, 1);
                }
            }

            for(let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                // Custom draw for particles to use hsla
                ctx.globalCompositeOperation = 'lighter';
                ctx.beginPath();
                if(particles[i].trail.length > 0) {
                    ctx.moveTo(particles[i].trail[0].x, particles[i].trail[0].y);
                    for(let j=1; j<particles[i].trail.length; j++) {
                        ctx.lineTo(particles[i].trail[j].x, particles[i].trail[j].y);
                    }
                }
                const colorBase = particles[i].color.substring(4, particles[i].color.length-1);
                ctx.strokeStyle = `hsla(${colorBase}, ${particles[i].alpha})`;
                ctx.lineWidth = 2.5;
                ctx.stroke();
                ctx.globalCompositeOperation = 'source-over';

                if(particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        loop();
    </script>
</body>
</html>
