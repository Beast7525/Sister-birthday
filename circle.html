<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circular Gallery</title>
  <link rel="stylesheet" href="circle.css">
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
      font-family: sans-serif;
    }

    .circular-gallery {
      width: 100%;
      height: 100%;
      outline: none;
    }


    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-family: sans-serif;
      font-weight: 600;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
      z-index: 1000;
      font-size: 1rem;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      box-shadow: 0 0 16px rgba(255, 255, 255, 0.2);
    }

    .hint-label {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.85rem;
      pointer-events: none;
      z-index: 1000;
      letter-spacing: 0.05em;
    }

    /* Mobile responsive */
    @media (max-width: 768px) {
      .back-btn {
        top: 12px;
        left: 12px;
        padding: 8px 14px;
        font-size: 0.85rem;
      }

      .hint-label {
        font-size: 0.75rem;
        bottom: 14px;
      }
    }

    @media (max-width: 480px) {
      .back-btn {
        top: 10px;
        left: 10px;
        padding: 6px 12px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>

<body>
  <a href="carousel.html" class="back-btn">&#8592; Back</a>
  <div id="gallery" class="circular-gallery" tabindex="0" role="region"
    aria-label="Circular image gallery. Use left and right arrow keys to navigate."></div>
  <p class="hint-label">Drag or swipe to explore &bull; Use ← → keys to navigate</p>

  <script type="module">
    import { Camera, Mesh, Plane, Program, Renderer, Texture, Transform } from 'https://esm.sh/ogl@1.0.11';

    function debounce(func, wait) {
      let timeout;
      return function (...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
      };
    }

    function lerp(p1, p2, t) {
      return p1 + (p2 - p1) * t;
    }

    function autoBind(instance) {
      const proto = Object.getPrototypeOf(instance);
      Object.getOwnPropertyNames(proto).forEach(key => {
        if (key !== 'constructor' && typeof instance[key] === 'function') {
          instance[key] = instance[key].bind(instance);
        }
      });
    }

    const DEFAULT_FONT = 'bold 30px Figtree';
    const DEFAULT_FONT_URL = 'https://fonts.googleapis.com/css2?family=Figtree:wght@400;700&display=swap';

    function deriveFontFamilyFromUrl(url) {
      const fileName = (url.split('/').pop() || 'custom-font').split('?')[0];
      const base = fileName.replace(/\.(woff2?|ttf|otf|eot)$/i, '');
      return base.replace(/[^a-zA-Z0-9-_ ]/g, '').trim() || 'CircularGalleryFont';
    }

    async function loadFontFromStylesheet(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Failed to fetch font stylesheet (${response.status})`);
      const cssText = await response.text();
      const faceBlocks = cssText.match(/@font-face\s*{[^}]*}/g) || [];
      let family = null;
      const fontFaces = [];
      for (const block of faceBlocks) {
        const familyMatch = block.match(/font-family:\s*['"]?([^;'"]+)['"]?/);
        const urlMatch = block.match(/url\(\s*['"]?([^'")]+)['"]?\s*\)/);
        if (!familyMatch || !urlMatch) continue;
        family = familyMatch[1].trim();
        const descriptors = {};
        const weightMatch = block.match(/font-weight:\s*([^;]+);/);
        const styleMatch = block.match(/font-style:\s*([^;]+);/);
        const rangeMatch = block.match(/unicode-range:\s*([^;]+);/);
        if (weightMatch) descriptors.weight = weightMatch[1].trim();
        if (styleMatch) descriptors.style = styleMatch[1].trim();
        if (rangeMatch) descriptors.unicodeRange = rangeMatch[1].trim();
        fontFaces.push(new FontFace(family, `url(${urlMatch[1]})`, descriptors));
      }
      if (!family) throw new Error('No @font-face rule found in the stylesheet');
      await Promise.allSettled(
        fontFaces.map(async face => {
          await face.load();
          document.fonts.add(face);
        })
      );
      return family;
    }

    async function loadFontFromFile(url) {
      const family = deriveFontFamilyFromUrl(url);
      const fontFace = new FontFace(family, `url(${url})`);
      await fontFace.load();
      document.fonts.add(fontFace);
      return family;
    }

    async function loadCustomFont(fontUrl) {
      const isStylesheet = fontUrl.includes('fonts.googleapis.com') || /\.css(\?.*)?$/i.test(fontUrl);
      return isStylesheet ? loadFontFromStylesheet(fontUrl) : loadFontFromFile(fontUrl);
    }

    async function resolveFont(font, fontUrl) {
      const effectiveUrl = fontUrl || (font === DEFAULT_FONT ? DEFAULT_FONT_URL : null);
      if (!effectiveUrl) {
        if (document.fonts && document.fonts.load) {
          try {
            await document.fonts.load(font);
            await document.fonts.ready;
          } catch { }
        }
        return font;
      }
      try {
        const family = await loadCustomFont(effectiveUrl);
        const sizeMatch = font.match(/^\s*(.*?\d+px)/);
        const prefix = sizeMatch ? sizeMatch[1].trim() : 'bold 30px';
        const resolved = `${prefix} "${family}"`;
        if (document.fonts && document.fonts.load) {
          try {
            await document.fonts.load(resolved);
          } catch { }
        }
        return resolved;
      } catch (error) {
        console.error('CircularGallery: unable to load font', error);
        return font;
      }
    }

    function getFontSize(font) {
      const match = font.match(/(\d+)px/);
      return match ? parseInt(match[1], 10) : 30;
    }

    function createTextTexture(gl, text, font = 'bold 30px monospace', color = 'black') {
      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d');
      context.font = font;
      const metrics = context.measureText(text);
      const textWidth = Math.ceil(metrics.width);
      const textHeight = Math.ceil(getFontSize(font) * 1.2);
      canvas.width = textWidth + 20;
      canvas.height = textHeight + 20;
      context.font = font;
      context.fillStyle = color;
      context.textBaseline = 'middle';
      context.textAlign = 'center';
      context.clearRect(0, 0, canvas.width, canvas.height);
      context.fillText(text, canvas.width / 2, canvas.height / 2);
      const texture = new Texture(gl, { generateMipmaps: false });
      texture.image = canvas;
      return { texture, width: canvas.width, height: canvas.height };
    }

    class Title {
      constructor({ gl, plane, renderer, text, textColor = '#545050', font = '30px sans-serif' }) {
        autoBind(this);
        this.gl = gl;
        this.plane = plane;
        this.renderer = renderer;
        this.text = text;
        this.textColor = textColor;
        this.font = font;
        this.createMesh();
      }
      createMesh() {
        const { texture, width, height } = createTextTexture(this.gl, this.text, this.font, this.textColor);
        const geometry = new Plane(this.gl);
        const program = new Program(this.gl, {
          vertex: `
            attribute vec3 position;
            attribute vec2 uv;
            uniform mat4 modelViewMatrix;
            uniform mat4 projectionMatrix;
            varying vec2 vUv;
            void main() {
              vUv = uv;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragment: `
            precision highp float;
            uniform sampler2D tMap;
            varying vec2 vUv;
            void main() {
              vec4 color = texture2D(tMap, vUv);
              if (color.a < 0.1) discard;
              gl_FragColor = color;
            }
          `,
          uniforms: { tMap: { value: texture } },
          transparent: true
        });
        this.mesh = new Mesh(this.gl, { geometry, program });
        const aspect = width / height;
        const textHeight = this.plane.scale.y * 0.15;
        const textWidth = textHeight * aspect;
        this.mesh.scale.set(textWidth, textHeight, 1);
        this.mesh.position.y = -this.plane.scale.y * 0.5 - textHeight * 0.5 - 0.05;
        this.mesh.setParent(this.plane);
      }
    }

    class Media {
      constructor({ geometry, gl, image, index, length, renderer, scene, screen, text, viewport, bend, textColor, borderRadius = 0, font }) {
        this.extra = 0;
        this.geometry = geometry;
        this.gl = gl;
        this.image = image;
        this.index = index;
        this.length = length;
        this.renderer = renderer;
        this.scene = scene;
        this.screen = screen;
        this.text = text;
        this.viewport = viewport;
        this.bend = bend;
        this.textColor = textColor;
        this.borderRadius = borderRadius;
        this.font = font;
        this.createShader();
        this.createMesh();
        this.createTitle();
        this.onResize();
      }
      createShader() {
        const texture = new Texture(this.gl, { generateMipmaps: true });
        this.program = new Program(this.gl, {
          depthTest: false,
          depthWrite: false,
          vertex: `
            precision highp float;
            attribute vec3 position;
            attribute vec2 uv;
            uniform mat4 modelViewMatrix;
            uniform mat4 projectionMatrix;
            uniform float uTime;
            uniform float uSpeed;
            varying vec2 vUv;
            void main() {
              vUv = uv;
              vec3 p = position;
              p.z = (sin(p.x * 4.0 + uTime) * 1.5 + cos(p.y * 2.0 + uTime) * 1.5) * (0.1 + uSpeed * 0.5);
              gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
            }
          `,
          fragment: `
            precision highp float;
            uniform vec2 uImageSizes;
            uniform vec2 uPlaneSizes;
            uniform sampler2D tMap;
            uniform float uBorderRadius;
            uniform float uHover;
            varying vec2 vUv;
            
            float roundedBoxSDF(vec2 p, vec2 b, float r) {
              vec2 d = abs(p) - b;
              return length(max(d, vec2(0.0))) + min(max(d.x, d.y), 0.0) - r;
            }
            
            void main() {
              vec2 ratio = vec2(
                min((uPlaneSizes.x / uPlaneSizes.y) / (uImageSizes.x / uImageSizes.y), 1.0),
                min((uPlaneSizes.y / uPlaneSizes.x) / (uImageSizes.y / uImageSizes.x), 1.0)
              );
              vec2 uv = vec2(
                vUv.x * ratio.x + (1.0 - ratio.x) * 0.5,
                vUv.y * ratio.y + (1.0 - ratio.y) * 0.5
              );
              vec4 color = texture2D(tMap, uv);
              
              // Hover: brighten image and add warm color tint
              vec3 hoverColor = color.rgb * (1.0 + uHover * 0.45);
              hoverColor += vec3(uHover * 0.08, uHover * 0.04, uHover * 0.0);
              
              // Glow edge on hover
              float edgeDist = roundedBoxSDF(vUv - 0.5, vec2(0.5 - uBorderRadius - 0.01), uBorderRadius);
              float glowAlpha = smoothstep(0.02, 0.0, edgeDist) * uHover * 0.7;
              hoverColor = mix(hoverColor, vec3(1.0, 0.85, 0.4), glowAlpha);
              
              float d = roundedBoxSDF(vUv - 0.5, vec2(0.5 - uBorderRadius), uBorderRadius);
              float edgeSmooth = 0.002;
              float alpha = 1.0 - smoothstep(-edgeSmooth, edgeSmooth, d);
              
              gl_FragColor = vec4(hoverColor, alpha);
            }
          `,
          uniforms: {
            tMap: { value: texture },
            uPlaneSizes: { value: [0, 0] },
            uImageSizes: { value: [0, 0] },
            uSpeed: { value: 0 },
            uTime: { value: 100 * Math.random() },
            uBorderRadius: { value: this.borderRadius },
            uHover: { value: 0 }
          },
          transparent: true
        });
        const img = new Image();
        if (this.image.startsWith('http')) {
          img.crossOrigin = 'anonymous';
        }
        img.src = this.image;
        img.onload = () => {
          texture.image = img;
          this.program.uniforms.uImageSizes.value = [img.naturalWidth, img.naturalHeight];
        };
      }
      createMesh() {
        this.plane = new Mesh(this.gl, {
          geometry: this.geometry,
          program: this.program
        });
        this.plane.setParent(this.scene);
      }
      createTitle() {
        if (!this.text) return;
        this.title = new Title({
          gl: this.gl,
          plane: this.plane,
          renderer: this.renderer,
          text: this.text,
          textColor: this.textColor,
          font: this.font
        });
      }
      update(scroll, direction) {
        this.plane.position.x = this.x - scroll.current - this.extra;

        const x = this.plane.position.x;
        const H = this.viewport.width / 2;

        if (this.bend === 0) {
          this.plane.position.y = 0;
          this.plane.rotation.z = 0;
        } else {
          const B_abs = Math.abs(this.bend);
          const R = (H * H + B_abs * B_abs) / (2 * B_abs);
          const effectiveX = Math.min(Math.abs(x), H);

          const arc = R - Math.sqrt(R * R - effectiveX * effectiveX);
          if (this.bend > 0) {
            this.plane.position.y = -arc;
            this.plane.rotation.z = -Math.sign(x) * Math.asin(effectiveX / R);
          } else {
            this.plane.position.y = arc;
            this.plane.rotation.z = Math.sign(x) * Math.asin(effectiveX / R);
          }
        }

        this.speed = scroll.current - scroll.last;
        this.program.uniforms.uTime.value += 0.04;
        this.program.uniforms.uSpeed.value = this.speed;

        // Smoothly animate hover uniform
        const targetHover = this.isHovered ? 1.0 : 0.0;
        this.program.uniforms.uHover.value = lerp(this.program.uniforms.uHover.value, targetHover, 0.08);

        const planeOffset = this.plane.scale.x / 2;
        const viewportOffset = this.viewport.width / 2;
        this.isBefore = this.plane.position.x + planeOffset < -viewportOffset;
        this.isAfter = this.plane.position.x - planeOffset > viewportOffset;
        if (direction === 'right' && this.isBefore) {
          this.extra -= this.widthTotal;
          this.isBefore = this.isAfter = false;
        }
        if (direction === 'left' && this.isAfter) {
          this.extra += this.widthTotal;
          this.isBefore = this.isAfter = false;
        }
      }
      onResize({ screen, viewport } = {}) {
        if (screen) this.screen = screen;
        if (viewport) {
          this.viewport = viewport;
          if (this.plane.program.uniforms.uViewportSizes) {
            this.plane.program.uniforms.uViewportSizes.value = [this.viewport.width, this.viewport.height];
          }
        }
        this.scale = this.screen.height / 1500;
        this.plane.scale.y = (this.viewport.height * (900 * this.scale)) / this.screen.height;
        this.plane.scale.x = (this.viewport.width * (700 * this.scale)) / this.screen.width;
        this.plane.program.uniforms.uPlaneSizes.value = [this.plane.scale.x, this.plane.scale.y];
        this.padding = 2;
        this.width = this.plane.scale.x + this.padding;
        this.widthTotal = this.width * this.length;
        this.x = this.width * this.index;
      }
    }

    class App {
      constructor(container, { items, bend, textColor = '#ffffff', borderRadius = 0, font = 'bold 30px Figtree', scrollSpeed = 2, scrollEase = 0.05 } = {}) {
        this.container = container;
        this.scrollSpeed = scrollSpeed;
        this.scroll = { ease: scrollEase, current: 0, target: 0, last: 0 };
        this.onCheckDebounce = debounce(this.onCheck.bind(this), 200);
        this.createRenderer();
        this.createCamera();
        this.createScene();
        this.onResize();
        this.createGeometry();
        this.createMedias(items, bend, textColor, borderRadius, font);
        this.update();
        this.addEventListeners();
      }
      createRenderer() {
        this.renderer = new Renderer({ alpha: true, antialias: true, dpr: Math.min(window.devicePixelRatio || 1, 2) });
        this.gl = this.renderer.gl;
        this.gl.clearColor(0, 0, 0, 0);
        this.container.appendChild(this.gl.canvas);
      }
      createCamera() {
        this.camera = new Camera(this.gl);
        this.camera.fov = 45;
        this.camera.position.z = 20;
      }
      createScene() {
        this.scene = new Transform();
      }
      createGeometry() {
        this.planeGeometry = new Plane(this.gl, { heightSegments: 50, widthSegments: 100 });
      }
      createMedias(items, bend = 1, textColor, borderRadius, font) {
        const defaultItems = [
          { image: 'image/image1.png' },
          { image: 'image/image2.png' },
          { image: 'image/image3.png' },
          { image: 'image/image4.png' },
          { image: 'image/image5.png' },
          { image: 'image/image6.png' },
          { image: 'image/image7.png' },
          { image: 'image/image8.png' },
          { image: 'image/image9.png' },
          { image: 'image/image10.png' },
          { image: 'image/image11.png' },
          { image: 'image/image12.png' }
        ];
        const galleryItems = items && items.length ? items : defaultItems;
        this.mediasImages = galleryItems.concat(galleryItems);
        this.medias = this.mediasImages.map((data, index) => {
          return new Media({ geometry: this.planeGeometry, gl: this.gl, image: data.image, index, length: this.mediasImages.length, renderer: this.renderer, scene: this.scene, screen: this.screen, text: data.text, viewport: this.viewport, bend, textColor, borderRadius, font });
        });
      }
      onTouchDown(e) {
        this.isDown = true;
        this.scroll.position = this.scroll.current;
        this.start = e.touches ? e.touches[0].clientX : e.clientX;
      }
      onTouchMove(e) {
        if (!this.isDown) return;
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const distance = (this.start - x) * (this.scrollSpeed * 0.025);
        this.scroll.target = this.scroll.position + distance;
      }
      onTouchUp() {
        this.isDown = false;
        this.onCheck();
      }
      onWheel(e) {
        const delta = e.deltaY || e.wheelDelta || e.detail;
        this.scroll.target += (delta > 0 ? this.scrollSpeed : -this.scrollSpeed) * 0.2;
        this.onCheckDebounce();
      }
      onKeyDown(e) {
        switch (e.key) {
          case 'ArrowRight': e.preventDefault(); this.scroll.target += this.scrollSpeed * 5; this.onCheckDebounce(); break;
          case 'ArrowLeft': e.preventDefault(); this.scroll.target -= this.scrollSpeed * 5; this.onCheckDebounce(); break;
          case 'Home': e.preventDefault(); this.scroll.target = 0; this.onCheckDebounce(); break;
        }
      }
      onCheck() {
        if (!this.medias || !this.medias[0]) return;
        const width = this.medias[0].width;
        const itemIndex = Math.round(Math.abs(this.scroll.target) / width);
        const item = width * itemIndex;
        this.scroll.target = this.scroll.target < 0 ? -item : item;
      }
      onMouseHover(e) {
        if (!this.medias || !this.viewport) return;
        // Convert mouse position to viewport space
        const rect = this.container.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const ndcX = ((clientX - rect.left) / rect.width) * 2 - 1;
        const ndcY = -((clientY - rect.top) / rect.height) * 2 + 1;
        const vpX = ndcX * (this.viewport.width / 2);
        const vpY = ndcY * (this.viewport.height / 2);

        this.medias.forEach(media => {
          const px = media.plane.position.x;
          const py = media.plane.position.y;
          const hw = media.plane.scale.x / 2;
          const hh = media.plane.scale.y / 2;
          media.isHovered = (
            vpX >= px - hw && vpX <= px + hw &&
            vpY >= py - hh && vpY <= py + hh
          );
        });

        // Change cursor when hovering over an image
        const anyHovered = this.medias.some(m => m.isHovered);
        this.container.style.cursor = anyHovered ? 'pointer' : 'grab';
      }
      onResize() {
        this.screen = { width: this.container.clientWidth, height: this.container.clientHeight };
        this.renderer.setSize(this.screen.width, this.screen.height);
        this.camera.perspective({ aspect: this.screen.width / this.screen.height });
        const fov = (this.camera.fov * Math.PI) / 180;
        const height = 2 * Math.tan(fov / 2) * this.camera.position.z;
        const width = height * this.camera.aspect;
        this.viewport = { width, height };
        if (this.medias) {
          this.medias.forEach(media => media.onResize({ screen: this.screen, viewport: this.viewport }));
        }
      }
      update() {
        this.scroll.current = lerp(this.scroll.current, this.scroll.target, this.scroll.ease);
        const direction = this.scroll.current > this.scroll.last ? 'right' : 'left';
        if (this.medias) {
          this.medias.forEach(media => media.update(this.scroll, direction));
        }
        this.renderer.render({ scene: this.scene, camera: this.camera });
        this.scroll.last = this.scroll.current;
        this.raf = window.requestAnimationFrame(this.update.bind(this));
      }
      addEventListeners() {
        this.boundOnResize = this.onResize.bind(this);
        this.boundOnWheel = this.onWheel.bind(this);
        this.boundOnTouchDown = this.onTouchDown.bind(this);
        this.boundOnTouchMove = this.onTouchMove.bind(this);
        this.boundOnTouchUp = this.onTouchUp.bind(this);
        this.boundOnKeyDown = this.onKeyDown.bind(this);
        this.boundOnMouseHover = this.onMouseHover.bind(this);
        window.addEventListener('resize', this.boundOnResize);
        window.addEventListener('wheel', this.boundOnWheel);
        window.addEventListener('mousedown', this.boundOnTouchDown);
        window.addEventListener('mousemove', this.boundOnTouchMove);
        window.addEventListener('mousemove', this.boundOnMouseHover);
        window.addEventListener('mouseup', this.boundOnTouchUp);
        window.addEventListener('touchstart', this.boundOnTouchDown);
        window.addEventListener('touchmove', this.boundOnTouchMove);
        window.addEventListener('touchend', this.boundOnTouchUp);
        this.container?.addEventListener('keydown', this.boundOnKeyDown);
      }
    }

    const container = document.getElementById('gallery');
    resolveFont('bold 30px Figtree', null).then(resolvedFont => {
      new App(container, {
        bend: 3,
        textColor: '#ffffff',
        borderRadius: 0.05,
        font: resolvedFont,
        scrollSpeed: 2,
        scrollEase: 0.05
      });
    });
  </script>
</body>

</html>
